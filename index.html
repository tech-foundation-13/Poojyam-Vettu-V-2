<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POOJYAM-VETT</title>

<style>
:root{
  --bg:#1e1e2f;
  --board:#111;
  --text:white;
  --accent:#00d4ff;
  --panel:#0f0f1a;
  --panel-soft:rgba(255,255,255,0.05);
}

*{ box-sizing:border-box; }

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,var(--bg),#2c2c54);
  color:var(--text);
  text-align:center;
  margin:0;
}

/* THEMES: swap CSS variables by adding a class to <body> */
body.light{ --bg:#f5f5f5; --board:#fff; --text:#111; --panel:#ffffff; --panel-soft:rgba(0,0,0,0.05); }
body.neon{ --bg:#000; --board:#020202; --text:#39ff14; --accent:#39ff14; --panel:#050505; --panel-soft:rgba(57,255,20,0.08); }

/* SETUP SCREEN */
#setup{
  width:min(480px,calc(100vw - 32px));
  margin:40px auto;
  padding:30px;
  border-radius:20px;
  background:linear-gradient(145deg,var(--panel),#1a1a2e);
  box-shadow:
    0 0 25px rgba(0,212,255,0.4),
    inset 0 0 15px rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  animation:fadeIn 0.5s ease;
}

#setup h2{
  font-size:28px;
  margin-bottom:20px;
  letter-spacing:1px;
  text-shadow:0 0 10px var(--accent);
}

.setup-group{
  margin:15px 0;
  padding:12px;
  border-radius:12px;
  background:var(--panel-soft);
  text-align:left;
}

.setup-group > label:first-child,
.setup-group > .group-title{
  display:block;
  font-weight:700;
  margin-bottom:8px;
}

#setup select,
#setup input[type="text"]{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#111;
  color:white;
  transition:0.2s;
}

body.light #setup select,
body.light #setup input[type="text"]{
  background:#f0f0f0;
  color:#111;
}

#setup select:hover,
#setup input[type="text"]:hover,
#setup select:focus,
#setup input[type="text"]:focus{
  box-shadow:0 0 8px var(--accent);
}

#nameInputs{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.name-field{
  min-width:0;
}

.name-field label{
  display:block;
  font-size:13px;
  margin-bottom:4px;
  opacity:0.85;
}

.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.toggle-copy{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.toggle-copy small{
  opacity:0.7;
}

.toggle{
  position:relative;
  width:58px;
  height:32px;
  flex:0 0 auto;
}

.toggle input{
  position:absolute;
  opacity:0;
  width:0;
  height:0;
}

.toggle-slider{
  position:absolute;
  inset:0;
  border-radius:999px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.12);
  transition:0.25s ease;
  cursor:pointer;
}

.toggle-slider::before{
  content:"";
  position:absolute;
  width:24px;
  height:24px;
  left:3px;
  top:3px;
  border-radius:50%;
  background:white;
  transition:0.25s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
}

.toggle input:checked + .toggle-slider{
  background:var(--accent);
}

.toggle input:checked + .toggle-slider::before{
  transform:translateX(26px);
}

#setup button{
  width:100%;
  margin-top:10px;
  font-weight:bold;
  letter-spacing:1px;
  transition:0.2s;
}

#setup button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px var(--accent);
}

@media (max-width:520px){
  #setup{
    padding:22px 18px;
  }

  #nameInputs{
    grid-template-columns:1fr;
  }

  .toggle-row{
    align-items:flex-start;
  }

  #boardPanel{
    width:calc(100vw - 12px);
  }

  #boardFrame{
    padding:8px;
    border-radius:16px;
  }

  #board{
    margin:8px auto;
  }
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* GAME AREA */
#game{
  display:none;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  align-items:flex-start;
}

#boardPanel{
  width:min(100vw - 24px, 920px);
}

#boardFrame{
  width:100%;
  overflow:auto;
  padding:12px;
  margin:0 auto;
  border-radius:20px;
  background:rgba(255,255,255,0.04);
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x pan-y;
}

#board{
  position:relative;
  background:var(--board);
  border-radius:15px;
  margin:20px auto;
  flex:0 0 auto;
}

.dot{
  width:24px;height:24px;
  border:2px solid var(--text);
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:2;
}
.dot:hover{ box-shadow:0 0 10px var(--accent); cursor:pointer; }
.dot.active{ background:var(--text); }

.dot::before{
  content:"";
  position:absolute;
  inset:-10px;
}

.line{
  position:absolute;
  height:4px;
  transform-origin:0 0;
  pointer-events:none;
  z-index:1;
  border-radius:999px;
  opacity:0.95;
}

.line.animating{
  animation:drawLine 0.22s ease-out forwards;
}

.line.recent-move{
  box-shadow:0 0 0 2px rgba(255,255,255,0.14),0 0 14px currentColor;
  filter:brightness(1.18);
}

.line.ai-move{
  box-shadow:0 0 0 2px rgba(255,255,255,0.16),0 0 18px currentColor,0 0 28px currentColor;
}

.box{
  position:absolute;
  opacity:0;
  transform:scale(0.6);
  transition:0.25s;
}
.box.show{ opacity:0.5; transform:scale(1); }

.box-label{
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
  pointer-events:none;
}

.active-player{
  background:var(--accent);
  color:black;
  border-radius:6px;
}

.score-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:8px 0;
  padding:10px 12px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}

.score-meta{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.score-name{
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.speaker-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 124px;
  position:relative;
  width:124px;
  min-width:124px;
  min-height:54px;
  padding:10px 14px;
  border-radius:20px;
  font-size:28px;
  line-height:1;
  background:linear-gradient(180deg,rgba(255,255,255,0.22),rgba(255,255,255,0.08));
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 10px 22px rgba(0,0,0,0.24);
  opacity:0;
  visibility:hidden;
  transform:translateY(8px) scale(0.94);
  transition:opacity 0.18s ease, transform 0.18s ease;
  overflow:visible;
}

.speaker-badge::after{
  content:"";
  position:absolute;
  left:18px;
  bottom:-10px;
  width:18px;
  height:18px;
  background:inherit;
  border-right:1px solid rgba(255,255,255,0.14);
  border-bottom:1px solid rgba(255,255,255,0.14);
  transform:rotate(35deg);
  border-bottom-right-radius:4px;
}

.speaker-badge.show{
  opacity:1;
  visibility:visible;
  transform:translateY(0) scale(1);
}

.speaker-badge.ai{
  background:linear-gradient(180deg,rgba(0,212,255,0.3),rgba(0,116,194,0.2));
  box-shadow:0 10px 22px rgba(0,80,140,0.28),0 0 16px rgba(0,212,255,0.18);
}

.speaker-badge.human{
  background:linear-gradient(180deg,rgba(255,255,255,0.22),rgba(255,255,255,0.1));
}

.score-points{
  font-weight:800;
  font-variant-numeric:tabular-nums;
}

.ai-level-status{
  display:none;
  width:max-content;
  max-width:min(92vw,420px);
  margin:0 auto 14px;
  padding:10px 16px;
  border-radius:999px;
  background:rgba(0,212,255,0.12);
  border:1px solid rgba(0,212,255,0.3);
  box-shadow:0 0 18px rgba(0,212,255,0.12);
  font-weight:700;
  letter-spacing:0.3px;
}

.ai-level-status.show{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

button,select,input{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
}

@keyframes popupScale{
  0%{ transform:scale(0.6); opacity:0; }
  100%{ transform:scale(1); opacity:1; }
}

@keyframes drawLine{
  from{ width:0; opacity:0.35; }
  to{ opacity:1; }
}

/* Intro screen shown once on load. */
#intro{
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
  overflow:hidden;
  animation:fadeOut 1s ease forwards;
  animation-delay:4s;
}

#introCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.flash{
  position:absolute;
  inset:0;
  background:white;
  opacity:1;
  animation:flashAnim 0.6s ease forwards;
}

.intro-content{
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

.logo{
  font-size:48px;
  font-weight:900;
  color:#00d4ff;
  text-shadow:0 0 20px #00d4ff,0 0 60px #00d4ff;
  animation:zoomPulse 2s ease;
}

.subtitle{
  margin-top:8px;
  letter-spacing:3px;
  opacity:0.8;
}

.loader{
  width:240px;
  height:6px;
  background:#222;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

.loader-bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#00d4ff,#ff00ff,#00ff88);
  animation:loadBar 3.5s ease forwards;
}

.hint{
  margin-top:12px;
  font-size:13px;
  opacity:0.6;
}

@keyframes loadBar{
  to{ width:100%; }
}

@keyframes zoomPulse{
  0%{ transform:scale(0.5); opacity:0; }
  50%{ transform:scale(1.2); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}

@keyframes flashAnim{
  to{ opacity:0; }
}

@keyframes fadeOut{
  to{
    opacity:0;
    visibility:hidden;
  }
}

.confetti{
  position:fixed;
  width:12px;
  height:20px;
  top:-10px;
  opacity:1;
  z-index:10003;
  pointer-events:none;
  animation:fall linear forwards;
  box-shadow:0 0 10px rgba(255,255,255,0.35);
  filter:saturate(1.25) brightness(1.15);
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
  }
}

#bgParticles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none; /* IMPORTANT so it won't block clicks */
}

body > *{
  position:relative;
  z-index:1;
}

.online-actions{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
}

.online-actions button{
  width:100%;
  margin:0;
}

.online-status{
  margin-top:12px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  font-size:14px;
  line-height:1.4;
}

.online-status.error{
  background:rgba(255,77,77,0.18);
  color:#ffd6d6;
}

.online-room-meta{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
  text-align:left;
}

.online-pill{
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  font-size:14px;
}

.online-player-list{
  display:grid;
  gap:8px;
  margin-top:12px;
}

.online-player-chip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  text-align:left;
}

.online-player-chip.you{
  border:1px solid rgba(0,212,255,0.45);
}

.online-player-chip.waiting{
  opacity:0.7;
  font-style:italic;
}

.host-badge{
  font-size:12px;
  font-weight:700;
  letter-spacing:0.4px;
  opacity:0.8;
}

@media (max-width:520px){
  .online-actions,
  .online-room-meta{
    grid-template-columns:1fr;
  }
}

button{background:var(--accent);}
</style>
</head>

<body>

<canvas id="bgParticles"></canvas>

<div id="intro">
  <canvas id="introCanvas"></canvas>
  <div class="intro-content">
    <div class="flash"></div>
    <div class="logo">🎮 SHILAYUGAM</div>
    <div class="subtitle">POOJYAM - VETTU</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <div class="hint">By Rikson</div>
  </div>
</div>

<div id="setup">
<h2>🎮 SHILAYUGAM POOJYAM-VETTU</h2>

<div class="setup-group">
  <label for="modeSelect">Mode</label>
  <select id="modeSelect">
    <option value="local" selected>Local / Offline</option>
    <option value="online">Online Room</option>
  </select>
</div>

<div class="setup-group" data-local-only="true">
  <label for="playerCount">Players</label>
  <select id="playerCount"></select>
</div>

<div class="setup-group">
  <label for="gridSize">Grid Size</label>
  <select id="gridSize"></select>
</div>

<div class="setup-group">
  <label for="themeSelect">Theme</label>
  <select id="themeSelect">
    <option value="">Dark</option>
    <option value="light">Light</option>
    <option value="neon">Neon</option>
  </select>
</div>

<div id="onlinePanel" class="setup-group" style="display:none;">
  <label for="onlinePlayerName">Your Name</label>
  <input id="onlinePlayerName" type="text" value="Player 1">

  <label for="onlineTotalPlayers">Total Players</label>
  <select id="onlineTotalPlayers"></select>

  <label for="onlineBotCount">Bots</label>
  <select id="onlineBotCount"></select>

  <label for="roomCodeInput">Room Code</label>
  <input id="roomCodeInput" type="text" maxlength="6" placeholder="Create a room or enter a code">

  <label for="roomPasswordInput">Room Password</label>
  <input id="roomPasswordInput" type="password" placeholder="Required for create and join">

  <div class="online-actions">
    <button id="createRoomBtn" type="button">Create Room</button>
    <button id="joinRoomBtn" type="button">Join Room</button>
    <button id="copyRoomBtn" type="button" style="display:none;">Copy Code</button>
    <button id="startOnlineBtn" type="button" style="display:none;">Start Match</button>
    <button id="leaveRoomBtn" type="button" style="display:none;">Leave Room</button>
  </div>

  <div id="onlineStatus" class="online-status">Create a private room, share the code and password, then start when both players are ready.</div>

  <div id="onlineRoomMeta" class="online-room-meta" style="display:none;">
    <div class="online-pill">Room: <strong id="roomCodeLabel">----</strong></div>
    <div class="online-pill" id="onlineRoleLabel">Not in a room</div>
  </div>

  <div id="onlinePlayersList" class="online-player-list"></div>
</div>

<div class="setup-group" data-local-only="true">
  <div class="group-title">Player Names</div>
  <div id="nameInputs"></div>
</div>

<div class="setup-group" data-local-only="true">
  <div class="toggle-row">
    <div class="toggle-copy">
      <strong>Thankan Chettan</strong>
      <small>എന്നെക്കൂടി കൂട്ട് മക്കളെ🥹</small>
    </div>
    <label class="toggle" for="aiToggle" aria-label="Enable AI Player">
      <input type="checkbox" id="aiToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<div class="setup-group" data-local-only="true">
  <label for="aiLevel">THANKAN POWER</label>
  <select id="aiLevel">
    <option value="easy">Cool👽</option>
    <option value="medium" selected>Scn😎</option>
    <option value="hard">Ultra Pro Max😈</option>
  </select>
</div>

<button id="startLocalBtn" onclick="startGame()">START GAME 🕹️</button>

<button id="soundBtn" onclick="toggleSound()">SOUND OFF 🔇</button>
</div>

<h3 id="turnText"></h3>
<div id="aiLevelStatus" class="ai-level-status" aria-live="polite"></div>

<div id="game">
<div id="boardPanel">
<div id="boardFrame">
<div id="board"></div>
</div>
<button id="restartBtn" onclick="restart()">Restart</button>
<button id="stopBtn" onclick="stopGame()">Stop</button>
</div>

<div id="scoreboard"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

// Player colors used for lines, boxes, and labels.
const colors=["#ff4d4d","#4dff88","#4da6ff","#ffd24d","#ff66cc","#66ffff"];

// Cache DOM elements once so we can reuse them everywhere.
const modeSelect=document.getElementById("modeSelect");
const playerCount=document.getElementById("playerCount");
const gridSize=document.getElementById("gridSize");
const themeSelect=document.getElementById("themeSelect");
const nameInputs=document.getElementById("nameInputs");
const aiToggle=document.getElementById("aiToggle");
const aiLevelSelect=document.getElementById("aiLevel");
const onlinePanel=document.getElementById("onlinePanel");
const onlinePlayerNameInput=document.getElementById("onlinePlayerName");
const onlineTotalPlayersSelect=document.getElementById("onlineTotalPlayers");
const onlineBotCountSelect=document.getElementById("onlineBotCount");
const roomCodeInput=document.getElementById("roomCodeInput");
const roomPasswordInput=document.getElementById("roomPasswordInput");
const createRoomBtn=document.getElementById("createRoomBtn");
const joinRoomBtn=document.getElementById("joinRoomBtn");
const copyRoomBtn=document.getElementById("copyRoomBtn");
const startOnlineBtn=document.getElementById("startOnlineBtn");
const leaveRoomBtn=document.getElementById("leaveRoomBtn");
const onlineStatus=document.getElementById("onlineStatus");
const onlineRoomMeta=document.getElementById("onlineRoomMeta");
const roomCodeLabel=document.getElementById("roomCodeLabel");
const onlineRoleLabel=document.getElementById("onlineRoleLabel");
const onlinePlayersList=document.getElementById("onlinePlayersList");
const startLocalBtn=document.getElementById("startLocalBtn");
const setup=document.getElementById("setup");
const game=document.getElementById("game");
const board=document.getElementById("board");
const scoreboard=document.getElementById("scoreboard");
const turnText=document.getElementById("turnText");
const aiLevelStatus=document.getElementById("aiLevelStatus");
const soundBtn=document.getElementById("soundBtn");
const restartBtn=document.getElementById("restartBtn");
const stopBtn=document.getElementById("stopBtn");
const localOnlyGroups=[...document.querySelectorAll("[data-local-only]")];

const LOCAL_MODE="local";
const ONLINE_MODE="online";
const ONLINE_DEFAULT_TOTAL_PLAYERS=2;
const AI_PLAYER_ID="AI";
const AI_DISPLAY_NAME="Thankan Chettan";
const AI_WIN_SOUND="sounds/laugh.mp3";
let gameMode=LOCAL_MODE;
let onlineRoomState=null;
let onlineGameState=null;
let onlineWinnerShown=false;


// Custom score voice configuration.
// You can use file names from this repository instead of full links.
// Examples:
// AI:["ai-1.mp3","ai-2.mp3"]
// AI:["sounds/ai-1.mp3","sounds/ai-2.mp3"]
// Full URLs still work too if you want them.
// The clips are played from a shuffled bag so the commentator feels less repetitive.
const VOICE_ASSET_FOLDER="sounds/";
const playerVoiceClips={
  AI:[
    "thankan.mp3",
    "lalu.mp3",
    "naga.mp3",
    "sayip1.mp3",
    "sura1.mp3",
    "sura2.mp3",
    "suraj.mp3",
    "vasu.mp3",
    "sayip2.mp3",
    "mukesh1.mp3",
    "mukesh2.mp3",
    "sayip3.mp3",
    "sayip4.mp3",
    "fahad.mp3"
  ],
  default:[]
};

// Emoji shown near the player in the scoreboard while that player's voice clip is playing.
const playerVoiceEmoji={
  AI:["🤬","😤","😠"],
  default:["🎉","😄","✨"]
};

// Score trigger rule for custom voice.
// `2` means play on score 1, 3, 5...
// `1` means play on every score.
const VOICE_TRIGGER_INTERVAL=2;

// The AI works like a commentator.
// It reacts when human players score, not when the AI itself scores.
const COMMENTATOR_NAME=AI_PLAYER_ID;
const AI_SEARCH_DEPTH={
  opening:3,
  midgame:5,
  late:7,
  endgame:9
};

const AI_CANDIDATE_WIDTH={
  opening:10,
  midgame:14,
  late:20,
  forced:8
};

const AI_EXACT_SEARCH_LIMITS={
  perfectGridSize:4,
  twoPlayerEndgameMoves:20
};

const AI_LONG_THINK_TIME_MS={
  grid5:2000,
  grid6:2500,
  grid7:3000
};

const AI_LONG_SEARCH_DEPTH={
  grid5:11,
  grid6:12,
  grid7:13
};

const AI_LEVEL_SETTINGS={
  easy:{
    searchDepthOffset:-1,
    longSearchDepthOffset:-2,
    candidateWidthOffset:-2,
    exactEndgameOffset:-8,
    longThinkTimeMs:{
      grid5:0,
      grid6:0,
      grid7:0
    }
  },
  medium:{
    searchDepthOffset:0,
    longSearchDepthOffset:0,
    candidateWidthOffset:0,
    exactEndgameOffset:0,
    longThinkTimeMs:{
      grid5:2000,
      grid6:2500,
      grid7:3000
    }
  },
  hard:{
    searchDepthOffset:3,

// Create the audio context only after user interaction.
async function initAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended"){
    await audioCtx.resume();
  }
  if(BACKGROUND_MUSIC_ENABLED){
    startBackgroundMusic();
  }
}

// Procedural background music loop made from simple oscillators.
function startBackgroundMusic(){
  if(!BACKGROUND_MUSIC_ENABLED) return;
  if(!audioCtx || musicStarted) return;
  musicStarted=true;

  musicGainNode=audioCtx.createGain();
  musicGainNode.gain.value=soundEnabled ? 0.08 : 0;
  musicGainNode.connect(audioCtx.destination);

  const melody=[261.63,329.63,392.0,493.88,392.0,329.63,293.66,349.23];
  const bass=[130.81,146.83,164.81,196.0];
  let step=0;

  const playStep=()=>{
    if(!audioCtx || !musicGainNode) return;

    // Schedule a lead note plus a bass note each step.
    const now=audioCtx.currentTime;
    const base=melody[step % melody.length];
    const bassNote=bass[step % bass.length];

    const lead=audioCtx.createOscillator();
    const pad=audioCtx.createOscillator();
    const bassOsc=audioCtx.createOscillator();
    const noteGain=audioCtx.createGain();
    const bassGain=audioCtx.createGain();

    lead.type="triangle";
    pad.type="sawtooth";
    bassOsc.type="sine";
    lead.frequency.value=base;
    pad.frequency.value=base*0.5;
    bassOsc.frequency.value=bassNote;

    noteGain.gain.setValueAtTime(0.0001,now);
    noteGain.gain.exponentialRampToValueAtTime(0.085,now+0.03);
    noteGain.gain.exponentialRampToValueAtTime(0.0001,now+0.42);

    bassGain.gain.setValueAtTime(0.0001,now);
    bassGain.gain.exponentialRampToValueAtTime(0.05,now+0.02);
    bassGain.gain.exponentialRampToValueAtTime(0.0001,now+0.55);

    lead.connect(noteGain);
    pad.connect(noteGain);
    bassOsc.connect(bassGain);
    noteGain.connect(musicGainNode);
    bassGain.connect(musicGainNode);

    lead.start(now);
    pad.start(now);
    bassOsc.start(now);
    lead.stop(now+0.45);
    pad.stop(now+0.45);
    bassOsc.stop(now+0.58);

    step++;
  };

  if(musicPulseTimer){
    clearInterval(musicPulseTimer);
  }
  playStep();
  musicPulseTimer=setInterval(playStep,450);
}

// Short sound when the player clicks a dot.
function playClick(){
  if(!audioCtx||!soundEnabled) return;
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.frequency.value=500;
  g.gain.value=0.05;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+0.05);
}

// Short sound when a line is drawn.
function playLine(){
  if(!audioCtx||!soundEnabled) return;
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.frequency.value=200;
  g.gain.value=0.05;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+0.1);
}

// Rising sound when a player completes a box.
function playScore(){
  if(!audioCtx||!soundEnabled) return;
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.frequency.value=300;
  g.gain.value=0.1;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  o.frequency.exponentialRampToValueAtTime(800,audioCtx.currentTime+0.2);
  o.stop(audioCtx.currentTime+0.2);
}

function playVictorySound(aiWon=false){
  if(!audioCtx || !soundEnabled) return;

  const baseTime=audioCtx.currentTime;
  const notes=[523,659,784,1046,1318];

  notes.forEach((f,i)=>{
    let o=audioCtx.createOscillator();
    let g=audioCtx.createGain();

    o.type="sine";
    o.frequency.value=f;
    g.gain.value=0.12;

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start(baseTime+i*0.12);
    o.stop(baseTime+i*0.25);
  });

  if(aiWon){
    const winAudio=new Audio(AI_WIN_SOUND);
    winAudio.volume=1;
    winAudio.play().catch(()=>{});
  }

  if(!aiWon) return;

  const robotPhrase=[660,784,932,1174];

  robotPhrase.forEach((f,i)=>{
    const startAt=baseTime+0.14+i*0.13;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    const filter=audioCtx.createBiquadFilter();

    osc.type=i%2===0 ? "square" : "sawtooth";
    osc.frequency.setValueAtTime(f,startAt);
    osc.frequency.linearRampToValueAtTime(f*0.72,startAt+0.16);

    filter.type="lowpass";
    filter.frequency.value=1500;

    gain.gain.setValueAtTime(0.0001,startAt);
    gain.gain.exponentialRampToValueAtTime(0.07,startAt+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,startAt+0.18);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(startAt);
    osc.stop(startAt+0.2);
  });
}

function getBoardGapForSize(boardSize){
  const isPhone=window.innerWidth<=640;
  const maxBoard=Math.min(window.innerWidth-48,window.innerHeight-180);
  const minGap=isPhone ? MOBILE_MIN_GAP : DESKTOP_MIN_GAP;
  const dynamicMaxGap=boardSize<=4 ? SMALL_BOARD_MAX_GAP : boardSize<=6 ? 110 : LARGE_BOARD_MAX_GAP;
  return Math.max(minGap,Math.min(dynamicMaxGap,maxBoard/(boardSize-1)));
}

function updateOnlineLobbyUI(){
  const inRoom=Boolean(onlineRoomState);
  const isHost=inRoom && onlineRoomState.hostId===socket.id;
  const totalPlayers=inRoom ? (+onlineRoomState.settings?.totalPlayers || ONLINE_DEFAULT_TOTAL_PLAYERS) : (+onlineTotalPlayersSelect.value || ONLINE_DEFAULT_TOTAL_PLAYERS);
  const botCount=inRoom ? (+onlineRoomState.settings?.botCount || 0) : (+onlineBotCountSelect.value || 0);
  const requiredHumans=Math.max(1,totalPlayers-botCount);
  const humanCountInRoom=inRoom ? onlineRoomState.players.filter(player=>!player.isBot).length : 0;
  const roomReady=humanCountInRoom>=requiredHumans;
  const waitingHumans=Math.max(0,requiredHumans-humanCountInRoom);
  const currentTurnId=onlineGameState?.players?.[onlineGameState.currentPlayer]?.id || "";
  const canEditSettings=!inRoom || (isHost && !onlineRoomState?.started);

  onlinePanel.style.display=isOnlineMode() ? "block" : "none";
  onlinePlayerNameInput.disabled=inRoom;
  roomCodeInput.disabled=inRoom;
  roomPasswordInput.disabled=inRoom;
  createRoomBtn.style.display=isOnlineMode() && !inRoom ? "" : "none";
  joinRoomBtn.style.display=isOnlineMode() && !inRoom ? "" : "none";
  copyRoomBtn.style.display=isOnlineMode() && inRoom ? "" : "none";
  leaveRoomBtn.style.display=isOnlineMode() && inRoom ? "" : "none";
  startOnlineBtn.style.display=isOnlineMode() && inRoom && isHost ? "" : "none";
  startOnlineBtn.disabled=!(isHost && roomReady && !onlineRoomState?.started);
  onlineRoomMeta.style.display=inRoom ? "grid" : "none";
  roomCodeLabel.textContent=inRoom ? onlineRoomState.roomCode : "----";
  onlineRoleLabel.textContent=inRoom ? (isHost ? "Host" : "Guest") : "Not in a room";
  gridSize.disabled=!canEditSettings;
  themeSelect.disabled=!canEditSettings;
  onlineTotalPlayersSelect.disabled=!canEditSettings;
  onlineBotCountSelect.disabled=!canEditSettings;

  if(inRoom && onlineRoomState.settings){
    gridSize.value=String(onlineRoomState.settings.size);
    themeSelect.value=onlineRoomState.settings.theme || "";
    onlineTotalPlayersSelect.value=String(totalPlayers);
    syncOnlineBotOptions(botCount);
  }

  if(!inRoom){
    onlinePlayersList.innerHTML="";
    return;
  }

  const playerMarkup=onlineRoomState.players.map((player,index)=>{
    const badges=[];
    if(player.isBot) badges.push("AI");
    if(player.id===socket.id) badges.push("You");
    if(!player.isBot && player.id===onlineRoomState.hostId) badges.push("Host");
    if(onlineRoomState.started && player.id===currentTurnId) badges.push("Turn");

    return `
      <div class="online-player-chip ${player.id===socket.id ? "you" : ""}">
        <span>${escapeHtml(player.name)}</span>
        <span class="host-badge">${badges.join(" • ") || `Player ${index+1}`}</span>
      </div>
    `;
  });

  if(waitingHumans>0){
    playerMarkup.push(`
      <div class="online-player-chip waiting">
        <span>Waiting for friend...</span>
        <span class="host-badge">${waitingHumans} human seat${waitingHumans===1 ? "" : "s"} left</span>
      </div>
    `);
  }

  onlinePlayersList.innerHTML=playerMarkup.join("");

  if(onlineRoomState.notice){
    setOnlineStatus(onlineRoomState.notice);
  }else if(onlineRoomState.started){
    setOnlineStatus("Match is live.");
  }else if(!roomReady){
    setOnlineStatus(`Room ${onlineRoomState.roomCode} ready. Waiting for ${waitingHumans} more human player${waitingHumans===1 ? "" : "s"}.`);
  }else if(isHost){
    setOnlineStatus("Room is ready. Press Start Match.");
  }else{
    setOnlineStatus("Room is ready. Waiting for the host to start.");
  }
}

    return;

function handleSharedSettingChange(){
  if(!isOnlineMode()) return;
  if(!onlineRoomState) return;
  if(onlineRoomState.hostId!==socket.id) return;

function createOnlineRoom(){
  if(!socket.connected){
    setOnlineStatus("Still connecting to the server. Try again in a moment.",true);
    return;
  }

  const password=roomPasswordInput.value.trim();
  if(!password){
    setOnlineStatus("Add a room password before creating the room.",true);
    return;
  }

  socket.emit("create-room",{
    playerName:getOnlinePlayerName(),
    password,
    settings:getOnlineRoomSettings()
  },response=>{
    if(!response?.ok){
      setOnlineStatus(response?.error || "Could not create the room.",true);
      return;
    }

    roomCodeInput.value=response.roomCode || "";
    setOnlineStatus(`Room ${response.roomCode} created. Share the code and password with your friend.`);
  });
}

function joinOnlineRoom(){
  if(!socket.connected){
    setOnlineStatus("Still connecting to the server. Try again in a moment.",true);
    return;
  }

  const roomCode=roomCodeInput.value.trim().toUpperCase();
  const password=roomPasswordInput.value.trim();

  if(!roomCode){
    setOnlineStatus("Enter the room code first.",true);
    return;
  }

  if(!password){
    setOnlineStatus("Enter the room password to join.",true);
    return;
  }

  socket.emit("join-room",{
    playerName:getOnlinePlayerName(),
    roomCode,
    password
  },response=>{
    if(!response?.ok){
      setOnlineStatus(response?.error || "Could not join that room.",true);
      return;
    }

    roomCodeInput.value=roomCode;
    setOnlineStatus(`Joined room ${roomCode}.`);
  });
}

function startOnlineGame(){

    }
  });

function leaveOnlineRoom(){
  if(!onlineRoomState){
    clearOnlineRoomState();
    syncModeUI();
    return;
  }

  socket.emit("leave-room",response=>{
    if(response && response.ok===false){
      setOnlineStatus(response.error || "Could not leave the room.",true);

    }

    clearOnlineRoomState();
    setup.style.display="block";
    game.style.display="none";

    setOnlineStatus(`Room code ${onlineRoomState.roomCode} copied.`);

  if(isOnlineMode() && !onlineRoomState){

socket.on("disconnect",()=>{

socket.on("action-error",payload=>{

});

socket.on("room-state",payload=>{
  onlineRoomState=payload;
  if(modeSelect.value!==ONLINE_MODE){
    modeSelect.value=ONLINE_MODE;
    gameMode=ONLINE_MODE;
  }

  syncModeUI();

  if(!payload.started && !onlineGameState?.finished && !document.getElementById("winnerPopup")){
    game.style.display="none";
    setup.style.display="block";
  }
});

socket.on("game-state",payload=>{
  const previousSnapshot=onlineGameState;
  if(onlineRoomState){
    onlineRoomState.started=!payload.finished;
    onlineRoomState.players=payload.players;
    onlineRoomState.settings={
      size:payload.size,
      theme:payload.theme,
      totalPlayers:payload.players.length,
      botCount:payload.players.filter(player=>player.isBot).length
    };
  }
  onlineGameState=payload;
  onlineWinnerShown=false;
  applyOnlineGameState(payload,previousSnapshot);
});

// Read setup values, initialize game state, then show the board.
function startGame(){
  if(isOnlineMode()){
    setOnlineStatus("Use the online room buttons to create or join a match first.",true);
    return;
  }

  document.body.className=themeSelect.value;
  size=+gridSize.value;
  gap=getBoardGapForSize(size);
  AI=aiToggle.checked;
  aiLevel=aiLevelSelect.value;
  resetRoundFeedbackState();

  players=[];scores=[];
  for(let i=0;i<playerCount.value;i++){
    players.push(document.getElementById("name"+i).value || `P${i+1}`);
    scores.push(0);
  }

  if(AI) players[players.length-1]=AI_PLAYER_ID;

  setup.style.display="none";
  game.style.display="flex";

  initBoard();
  updateScore();
  updateAIDifficultyStatus();

  setTimeout(aiMove,500);
}

// Build the visible dot grid based on selected size.
function initBoard(){
  board.innerHTML="";
  dots=[];lines=[];boxes=[];
  moveLibrary=[];
  moveByKey=new Map();
  boxLibrary=[];

  let boardSize=(size-1)*gap+DOT;
  board.style.width=boardSize+"px";
  board.style.height=boardSize+"px";
  const boardFrame=document.getElementById("boardFrame");
  if(boardFrame){
    boardFrame.scrollLeft=0;
    boardFrame.scrollTop=0;
  }

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let d=document.createElement("div");
      d.className="dot";
      d.style.left=(c*gap+DOT/2)+"px";
      d.style.top=(r*gap+DOT/2)+"px";
      d.dataset.r=r; d.dataset.c=c;
      d.onclick=()=>handleClick(d);
      board.appendChild(d);
      dots.push(d);
    }
  }
  buildBoardGraph();
}

// Players select two neighboring dots to draw a line.
function handleClick(dot){
  if(gameFinished) return;
  if(isOnlineMode()){
    if(!onlineRoomState?.started || !onlineGameState) return;

    const myPlayerIndex=onlineGameState.players.findIndex(player=>player.id===socket.id);
    if(myPlayerIndex===-1){
      setOnlineStatus("You are not seated in this room.",true);
      return;
    }

    if(myPlayerIndex!==onlineGameState.currentPlayer){
      setOnlineStatus("Wait for your turn.",true);
      return;
    }
  }

  if(AI && players[currentPlayer]==="AI") return;

  playClick();

  if(selected.includes(dot)) return;

  dot.classList.add("active");
  selected.push(dot);

  if(selected.length===2){
    let [a,b]=selected;

    if(valid(a,b)&&!exists(a,b)){
      if(isOnlineMode()){
        socket.emit("play-move",{
          moveKey:edgeKey(a,b)
        },response=>{
          if(!response?.ok){
            setOnlineStatus(response?.error || "That move was rejected.",true);
          }
        });
      }else{
        drawLine(a,b);

        let scored=checkBox();

        if(!scored) currentPlayer=(currentPlayer+1)%players.length;
        updateScore();

        if(!gameFinished){
          setTimeout(aiMove,300);
        }
      }
    }

    selected.forEach(d=>d.classList.remove("active"));
    selected=[];
  }
}

// A legal move must connect adjacent dots horizontally or vertically.
function valid(a,b){
  let r1=+a.dataset.r,c1=+a.dataset.c;
  let r2=+b.dataset.r,c2=+b.dataset.c;
  return (r1===r2&&Math.abs(c1-c2)===1)||(c1===c2&&Math.abs(r1-r2)===1);
}

// Check whether a line already exists between two dots.
function exists(a,b){
  return lines.some(l=>(l[0]===a&&l[1]===b)||(l[0]===b&&l[1]===a));
}

// Alias used when checking box completion.
function has(a,b){
  return lines.some(l=>(l[0]===a&&l[1]===b)||(l[0]===b&&l[1]===a));
}

// Find a dot element by row/column coordinates.
function dotAt(r,c){
  return dots.find(d=>d.dataset.r==r&&d.dataset.c==c);
}

// Normalize an edge into a consistent string key.
function edgeKeyFromCoords(r1,c1,r2,c2){
  if(r1>r2 || (r1===r2 && c1>c2)){
    [r1,c1,r2,c2]=[r2,c2,r1,c1];
  }
  return `${r1},${c1}|${r2},${c2}`;
}

function edgeKey(a,b){
  return edgeKeyFromCoords(+a.dataset.r,+a.dataset.c,+b.dataset.r,+b.dataset.c);
}

// Build a Set of all current lines, with an optional extra trial move.
function getLineSet(extraMove){
  const set=new Set(lines.map(([a,b])=>edgeKey(a,b)));
  if(extraMove){
    set.add(edgeKey(extraMove[0],extraMove[1]));
  }
  return set;
}

function getLineMask(extraMove){
  let mask=0n;

  for(const [a,b] of lines){
    const moveMeta=moveByKey.get(edgeKey(a,b));
    if(moveMeta){
      mask|=moveMeta.bit;
    }
  }

  if(extraMove){
    const moveMeta=getMoveMeta(extraMove);
    if(moveMeta){
      mask|=moveMeta.bit;
    }
  }

  return mask;
}

// Return the four edges that make up one box.
function boxEdges(r,c){
  return [
    edgeKeyFromCoords(r,c,r,c+1),
    edgeKeyFromCoords(r,c,r+1,c),
    edgeKeyFromCoords(r,c+1,r+1,c+1),
    edgeKeyFromCoords(r+1,c,r+1,c+1)
  ];
}

// A move can affect at most two neighboring boxes.
function getAdjacentBoxesFromCoords(r1,c1,r2,c2){
  const adjacent=[];

  if(r1===r2){
    const row=r1;
    const col=Math.min(c1,c2);
    if(row>0) adjacent.push([row-1,col]);
    if(row<size-1) adjacent.push([row,col]);
  }else{
    const row=Math.min(r1,r2);
    const col=c1;
    if(col>0) adjacent.push([row,col-1]);
    if(col<size-1) adjacent.push([row,col]);
  }

  return adjacent;
}

function getAdjacentBoxes(move){
  return getAdjacentBoxesFromCoords(
    +move[0].dataset.r,
    +move[0].dataset.c,
    +move[1].dataset.r,
    +move[1].dataset.c
  );
}

function buildBoardGraph(){
  moveLibrary=[];
  moveByKey=new Map();
  boxLibrary=[];

  const boxById=new Map();
  for(let r=0;r<size-1;r++){
    for(let c=0;c<size-1;c++){
      const boxRef={
        id:`${r},${c}`,
        r,
        c,
        edges:boxEdges(r,c)
      };
      boxLibrary.push(boxRef);
      boxById.set(boxRef.id,boxRef);
    }
  }

  const registerMove=(r1,c1,r2,c2)=>{
      const key=edgeKeyFromCoords(r1,c1,r2,c2);
    const moveMeta={
      key,
      bit:1n<<BigInt(moveLibrary.length),
      a:dotAt(r1,c1),
      b:dotAt(r2,c2),
      boxes:getAdjacentBoxesFromCoords(r1,c1,r2,c2)
        .map(([r,c])=>boxById.get(`${r},${c}`))
        .filter(Boolean)
    };

    moveMeta.isBoundary=moveMeta.boxes.length===1;
    moveLibrary.push(moveMeta);
    moveByKey.set(key,moveMeta);
  };

  for(let r=0;r<size;r++){
    for(let c=0;c<size-1;c++){
      registerMove(r,c,r,c+1);
    }
  }

  for(let r=0;r<size-1;r++){
    for(let c=0;c<size;c++){
      registerMove(r,c,r+1,c);
    }
  }

  boxLibrary.forEach(boxRef=>{
    boxRef.edgeBits=boxRef.edges.map(edge=>moveByKey.get(edge)?.bit || 0n);
  });
}

function getMoveMeta(move){
  if(!move) return null;
  if(move.key) return move;
  return moveByKey.get(edgeKey(move[0],move[1])) || null;
}

function countBoxSides(boxRef,lineSet){
  let sides=0;
  for(const edge of boxRef.edges){
    if(lineSet.has(edge)){
      sides++;
    }
  }
  return sides;
}

function countBoxSidesFromMask(boxRef,lineMask){
  let sides=0;

  for(const bit of boxRef.edgeBits || []){
    if(bit!==0n && (lineMask & bit)!==0n){
      sides++;
    }
  }

  return sides;
}

function inspectMoveMetaFromMask(move,lineMask){
  const moveMeta=getMoveMeta(move);
  if(!moveMeta){
    return {completedBoxes:0,createdThirdEdges:0,createdSecondEdges:0};
  }

  let completedBoxes=0;
  let createdThirdEdges=0;
  let createdSecondEdges=0;

  for(const boxRef of moveMeta.boxes){
    const sides=countBoxSidesFromMask(boxRef,lineMask)+1;
    if(sides===4) completedBoxes++;
    else if(sides===3) createdThirdEdges++;
    else if(sides===2) createdSecondEdges++;
  }

  return {completedBoxes, createdThirdEdges, createdSecondEdges};
}

function getAvailableMovesFromMask(lineMask){
  return moveLibrary.filter(move=>(lineMask & move.bit)===0n);
}

function orderMovesForExactSearch(moves,lineMask){
  return moves
    .map(move=>({
      move:getMoveMeta(move),
      stats:inspectMoveMetaFromMask(move,lineMask)
    }))
    .sort((a,b)=>{
      if(b.stats.completedBoxes!==a.stats.completedBoxes){
        return b.stats.completedBoxes-a.stats.completedBoxes;
      }
      if(a.stats.createdThirdEdges!==b.stats.createdThirdEdges){
        return a.stats.createdThirdEdges-b.stats.createdThirdEdges;
      }
      return 0;
    })
    .map(entry=>entry.move);
}

function applyTwoPlayerSimulatedMove(lineMask,playerIndex,move){
  const moveMeta=getMoveMeta(move);
  const nextLineMask=lineMask | moveMeta.bit;
  let gained=0;

  for(const boxRef of moveMeta.boxes){
    if(countBoxSidesFromMask(boxRef,nextLineMask)===4){
      gained++;
    }
  }

  return {
    lineMask:nextLineMask,
    playerIndex:gained>0 ? playerIndex : (playerIndex+1)%players.length,
    gained
  };
}

function searchTwoPlayerExactOutcome(lineMask,playerIndex,movesLeft,alpha,beta){
  if(movesLeft===0){
    return {score:0,move:null};
  }

  const stateKey=`${playerIndex}|${lineMask.toString()}`;
  const cached=twoPlayerExactCache.get(stateKey);
  if(cached){
    return cached;
  }

  const candidates=orderMovesForExactSearch(
    getAvailableMovesFromMask(lineMask),
    lineMask
  );

  if(!candidates.length){
    return {score:0,move:null};
  }

  const aiIndex=getAIPlayerIndex();
  const maximizing=playerIndex===aiIndex;
  let bestScore=maximizing ? -Infinity : Infinity;
  let bestMove=candidates[0];

  for(const move of candidates){
    const nextState=applyTwoPlayerSimulatedMove(lineMask,playerIndex,move);
    const swing=playerIndex===aiIndex ? nextState.gained : -nextState.gained;
    const result=searchTwoPlayerExactOutcome(
      nextState.lineMask,
      nextState.playerIndex,
      movesLeft-1,
      alpha,
      beta
    );
    const totalScore=swing+result.score;

    if(maximizing){
      if(totalScore>bestScore){
        bestScore=totalScore;
        bestMove=move;
      }
      alpha=Math.max(alpha,bestScore);
    }else{
      if(totalScore<bestScore){
        bestScore=totalScore;
        bestMove=move;
      }
      beta=Math.min(beta,bestScore);
    }

    if(beta<=alpha){
      break;
    }
  }

  const bestResult={score:bestScore,move:bestMove};
  twoPlayerExactCache.set(stateKey,bestResult);
  return bestResult;
}

// Score a possible AI move:
// completedBoxes = boxes finished immediately
// createdThirdEdges = risky boxes left with 3 sides
function inspectMoveMeta(move,lineSet){
  const moveMeta=getMoveMeta(move);
  if(!moveMeta){
    return {completedBoxes:0,createdThirdEdges:0,createdSecondEdges:0};
  }

  let completedBoxes=0;
  let createdThirdEdges=0;
  let createdSecondEdges=0;

  for(const boxRef of moveMeta.boxes){
    const sides=countBoxSides(boxRef,lineSet)+1;
    if(sides===4) completedBoxes++;
    else if(sides===3) createdThirdEdges++;
    else if(sides===2) createdSecondEdges++;
  }

  return {completedBoxes, createdThirdEdges, createdSecondEdges};
}

function evaluateMove(move){
  return inspectMoveMeta(move,getLineSet());
}

// Collect every legal line the current player could draw.
function getAvailableMoves(){
  const lineSet=getLineSet();
  return moveLibrary.filter(move=>!lineSet.has(move.key));
}

// Draw a colored line between two dots and store it in game state.
function drawLine(a,b,options={}){
  const ownerIndex=options.ownerIndex ?? currentPlayer;
  const animate=options.animate ?? true;
  const highlightLastMove=options.highlightLastMove ?? true;
  const silent=options.silent ?? false;

  if(!silent){
    playLine();
  }

  let x1=parseInt(a.style.left),y1=parseInt(a.style.top);
  let x2=parseInt(b.style.left),y2=parseInt(b.style.top);

  let l=document.createElement("div");
  l.className="line";

  let len=Math.hypot(x2-x1,y2-y1);
  let ang=Math.atan2(y2-y1,x2-x1)*180/Math.PI;

  l.style.width=len+"px";
  l.style.left=x1+"px";
  l.style.top=y1+"px";
  l.style.transform=`rotate(${ang}deg)`;
  l.style.background=colors[ownerIndex % colors.length];
  l.style.color=colors[ownerIndex % colors.length];
  if(animate){
    l.classList.add("animating");
  }

  // Keep only the newest line highlighted so players can easily see the latest move.
  if(highlightLastMove && lastDrawnLine){
    lastDrawnLine.classList.remove("recent-move","ai-move");
  }
  if(highlightLastMove){
    l.classList.add("recent-move");
  }

  // Give AI moves a stronger glow so they are easy to identify.
  if(highlightLastMove && isBotPlayerAtIndex(ownerIndex)){
    l.classList.add("ai-move");
  }

  board.appendChild(l);
  lines.push([a,b]);
  if(highlightLastMove){
    lastDrawnLine=l;
  }

  if(animate){
    setTimeout(()=>l.classList.remove("animating"),240);
  }
}

// After each move, scan the board for newly completed boxes.
function checkBox(){
  let scored=false;

  for(let r=0;r<size-1;r++){
    for(let c=0;c<size-1;c++){
      let a=dotAt(r,c),
          b=dotAt(r,c+1),
          d=dotAt(r+1,c),
          e=dotAt(r+1,c+1);

      let key=r+"-"+c;

      if(has(a,b)&&has(a,d)&&has(b,e)&&has(d,e)){
        if(!boxes.includes(key)){
          boxes.push(key);
          scored=true;

          const scoringPlayer=players[currentPlayer];
          scores[currentPlayer]++;
          playScore();
          queueVoiceForScore(scoringPlayer,scores[currentPlayer]);

          drawBox(r,c);
          drawLabel(r,c,scoringPlayer);
        }
      }
    }
  }

  if(boxes.length===(size-1)*(size-1)){
    gameFinished=true;
    setTimeout(stopGame,300);
  }

  return scored;
}

// Draw the colored fill inside a completed box.
function drawBox(r,c,ownerIndex=currentPlayer,animate=true){
  let b=document.createElement("div");
  b.className="box";

  b.style.left=(c*gap+DOT/2)+"px";
  b.style.top=(r*gap+DOT/2)+"px";
  b.style.width=gap+"px";
  b.style.height=gap+"px";
  b.style.background=colors[ownerIndex % colors.length];

  board.appendChild(b);
  if(animate){
    setTimeout(()=>b.classList.add("show"),50);
  }else{
    b.classList.add("show");
  }
}

// Put the player initials inside a claimed box.
function drawLabel(r,c,name){
  let l=document.createElement("div");
  l.className="box-label";

  l.style.left=(c*gap+DOT/2)+"px";
  l.style.top=(r*gap+DOT/2)+"px";
  l.style.width=gap+"px";
  l.style.height=gap+"px";

  l.innerText=getDisplayName(name).substring(0,3).toUpperCase();

  board.appendChild(l);
}

function getDisplayName(name){
  return name===AI_PLAYER_ID ? AI_DISPLAY_NAME : name;
}

function getOnlinePlayersSnapshot(){
  return onlineGameState?.players || [];
}

function isBotPlayerAtIndex(index){
  if(isOnlineMode()){
    return Boolean(getOnlinePlayersSnapshot()?.[index]?.isBot);
  }
  return players[index]===AI_PLAYER_ID;
}

function isBotPlayerName(name){
  if(name===AI_PLAYER_ID) return true;
  return getOnlinePlayersSnapshot().some(player=>player.name===name && player.isBot);
}

function hasCommentatorBot(){
  if(isOnlineMode()){
    return getOnlinePlayersSnapshot().some(player=>player.isBot);
  }
  return AI;
}

function getCommentatorPlayerName(){
  if(isOnlineMode()){
    return getOnlinePlayersSnapshot().find(player=>player.isBot)?.name || AI_DISPLAY_NAME;
  }
  return COMMENTATOR_NAME;
}

// Refresh the scoreboard and highlight whose turn it is.
function updateScore(){
  scoreboard.innerHTML="<h3>Score</h3>";

  players.forEach((p,i)=>{
    const safePlayer=escapeHtml(getDisplayName(p));
    const isAIPlayer=isBotPlayerAtIndex(i);
    scoreboard.innerHTML+=`
      <div class="score-row ${i===currentPlayer?"active-player":""}" id="scoreRow-${i}">
        <div class="score-meta">
          <span class="score-name">${safePlayer}</span>
          <span class="speaker-badge ${isAIPlayer ? "ai" : "human"}" id="speaker-${i}"></span>
        </div>
        <div class="score-points">${scores[i]}</div>
      </div>
    `;
  });

  turnText.innerText="Turn: "+getDisplayName(players[currentPlayer]);

  if(currentVoiceSpeaker){
    showSpeakerBadge(currentVoiceSpeaker,currentVoiceEmoji);
  }
}

function applyOnlineGameState(snapshot,previousSnapshot=null){
  if(!snapshot) return;

  if(modeSelect.value!==ONLINE_MODE){
    modeSelect.value=ONLINE_MODE;
    gameMode=ONLINE_MODE;
  }

  document.body.className=snapshot.theme || "";
  size=+snapshot.size;
  gap=getBoardGapForSize(size);
  AI=false;
  gameFinished=false;
  lastDrawnLine=null;
  selected.forEach(dot=>dot.classList.remove("active"));
  selected=[];
  twoPlayerExactCache.clear();
  aiThinkingToken++;
  aiSearchDeadline=0;

  players=snapshot.players.map(player=>player.name);
  scores=snapshot.scores.slice();
  currentPlayer=snapshot.currentPlayer;

  const previousLineKeys=new Set((previousSnapshot?.lines || []).map(line=>line.key));
  const previousBoxKeys=new Set((previousSnapshot?.boxes || []).map(box=>box.key));
  const newLineKey=snapshot.lastMove?.key && !previousLineKeys.has(snapshot.lastMove.key)
    ? snapshot.lastMove.key
    : "";
  const newBoxKeys=new Set(
    (snapshot.boxes || [])
      .map(box=>box.key)
      .filter(boxKey=>!previousBoxKeys.has(boxKey))
  );
  const scoreEvents=[];

  if(previousSnapshot){
    snapshot.scores.forEach((score,index)=>{
      const previousScore=previousSnapshot.scores?.[index] || 0;
      for(let nextScore=previousScore+1; nextScore<=score; nextScore++){
        scoreEvents.push({
          playerName:snapshot.players[index]?.name || players[index] || `P${index+1}`,
          scoreCount:nextScore
        });
      }
    });
  }

  initBoard();

  snapshot.lines.forEach(line=>{
    const moveMeta=moveByKey.get(line.key);
    if(!moveMeta) return;

    const isLatestMove=line.key===snapshot.lastMove?.key;
    const shouldAnimate=line.key===newLineKey;

    drawLine(moveMeta.a,moveMeta.b,{
      ownerIndex:line.ownerIndex,
      animate:shouldAnimate,
      highlightLastMove:isLatestMove,
      silent:!shouldAnimate
    });
  });

  snapshot.boxes.forEach(box=>{
    if(boxes.includes(box.key)) return;

    boxes.push(box.key);
    const [r,c]=box.key.split("-").map(Number);
    drawBox(r,c,box.ownerIndex,newBoxKeys.has(box.key));
    drawLabel(r,c,players[box.ownerIndex] || `P${box.ownerIndex+1}`);
  });

  if(previousSnapshot){
    scoreEvents.forEach(event=>{
      playScore();
      queueVoiceForScore(event.playerName,event.scoreCount);
    });
  }

  gameFinished=snapshot.finished;
  setup.style.display="none";
  game.style.display="flex";
  updateScore();
  updateAIDifficultyStatus();
  updateOnlineLobbyUI();

  if(snapshot.finished){
    if(!onlineWinnerShown){
      onlineWinnerShown=true;
      setTimeout(()=>stopGame(),250);
    }
  }else{
    setOnlineStatus(`Match live. Turn: ${getDisplayName(players[currentPlayer])}`);
  }
}

function getAIPlayerIndex(){
  return players.indexOf(AI_PLAYER_ID);
}

function getStrongestOpponentScore(scoreState,aiIndex){
  let strongest=0;

  scoreState.forEach((score,index)=>{
    if(index!==aiIndex){
      strongest=Math.max(strongest,score);
    }
  });

  return strongest;
}

function getAvailableMovesFromLineSet(lineSet){
  return moveLibrary.filter(move=>!lineSet.has(move.key));
}

function summarizeReplyOptions(lineSet){
  let scoringMoves=0;
    let safeMoves=0;

  for(const move of getAvailableMovesFromLineSet(lineSet)){
    const stats=inspectMoveMeta(move,lineSet);

    if(stats.completedBoxes>0){
      scoringMoves++;
    }else if(stats.createdThirdEdges===0){
      safeMoves++;
    }
  }

  return {scoringMoves,safeMoves};
}

function scoreMoveHeuristic(move,lineSet,playerIndex,movesLeft){
  const moveMeta=getMoveMeta(move);
  const stats=inspectMoveMeta(moveMeta,lineSet);
  let score=stats.completedBoxes*1600;

  score-=stats.createdThirdEdges*260;
  score-=stats.createdSecondEdges*28;

  if(moveMeta?.isBoundary){
    score+=18;
  }

  const shouldPreviewReplies=movesLeft<=36 || stats.completedBoxes>0 || stats.createdThirdEdges>0;

  if(shouldPreviewReplies && moveMeta){
    const nextLineSet=new Set(lineSet);
    nextLineSet.add(moveMeta.key);
    const replySummary=summarizeReplyOptions(nextLineSet);

    score-=replySummary.scoringMoves*95;
    score+=replySummary.safeMoves*4;
  }

  if(playerIndex!==getAIPlayerIndex()){
    score*=-1;
  }

  return score;
}

function orderMovesForSearch(moves,lineSet,playerIndex,movesLeft){
  return moves
    .map(move=>({
      move:getMoveMeta(move),
      stats:inspectMoveMeta(move,lineSet),
      weight:scoreMoveHeuristic(move,lineSet,playerIndex,movesLeft)
    }))
    .sort((a,b)=>{
      if(b.stats.completedBoxes!==a.stats.completedBoxes){
        return b.stats.completedBoxes-a.stats.completedBoxes;
      }
      return b.weight-a.weight;
    })
    .map(entry=>entry.move);
}

function getCurrentAISettings(){
  return AI_LEVEL_SETTINGS[aiLevel] || AI_LEVEL_SETTINGS.medium;
}

// FIX: this was missing in your OG script.
// 5x5 to 10x10 AI needs this for timed and normal search.
function getSearchDepth(movesLeft){
  const extra=getCurrentAISettings().searchDepthOffset || 0;
  let depth;

  if(movesLeft<=10) depth=AI_SEARCH_DEPTH.endgame;
  else if(movesLeft<=22) depth=AI_SEARCH_DEPTH.late;
  else if(movesLeft<=40) depth=AI_SEARCH_DEPTH.midgame;
  else depth=AI_SEARCH_DEPTH.opening;

  return Math.max(1,depth+extra);
}

// FIX: keep only one getLongSearchDepth function.
function getLongSearchDepth(movesLeft){
  const extra=getCurrentAISettings().longSearchDepthOffset || 0;
  let depth;

  if(size===5){
    depth=movesLeft<=24 ? AI_LONG_SEARCH_DEPTH.grid5+1 : AI_LONG_SEARCH_DEPTH.grid5;
  }else if(size===6){
    depth=movesLeft<=22 ? AI_LONG_SEARCH_DEPTH.grid6+1 : AI_LONG_SEARCH_DEPTH.grid6;
  }else{
    depth=movesLeft<=20 ? AI_LONG_SEARCH_DEPTH.grid7+1 : AI_LONG_SEARCH_DEPTH.grid7;
  }

  return Math.max(2,depth+extra);
}

function shouldUseExactSolver(movesLeft){
  const extra=getCurrentAISettings().exactEndgameOffset || 0;

  return players.length===2 && (
    size<=AI_EXACT_SEARCH_LIMITS.perfectGridSize ||
    movesLeft<=AI_EXACT_SEARCH_LIMITS.twoPlayerEndgameMoves+extra
  );
}

function getLongThinkTimeMs(){
  const thinkTime=getCurrentAISettings().longThinkTimeMs;

  if(size<=4) return 0;
  if(size===5) return thinkTime.grid5;
  if(size===6) return thinkTime.grid6;
  return thinkTime.grid7;
}

function hasSearchTimeExpired(){
  return aiSearchDeadline>0 && performance.now()>=aiSearchDeadline;
}

function getCandidateWidth(movesLeft,hasScoringMoves,hasSafeMoves){
  const bonus=size>=5 ? 2 : 0;
  const extra=getCurrentAISettings().candidateWidthOffset || 0;
  let width;

  if(hasScoringMoves){
    width=(movesLeft<=18 ? AI_CANDIDATE_WIDTH.late : AI_CANDIDATE_WIDTH.midgame)+bonus;
  }else if(!hasSafeMoves){
    width=AI_CANDIDATE_WIDTH.forced+bonus;
  }else if(movesLeft<=18){
    width=AI_CANDIDATE_WIDTH.late+bonus;
  }else if(movesLeft<=36){
    width=AI_CANDIDATE_WIDTH.midgame+bonus;
  }else{
    width=AI_CANDIDATE_WIDTH.opening+bonus;
  }

  return Math.max(2,width+extra);
}

function applySimulatedMove(lineSet,scoreState,playerIndex,move){
  const moveMeta=getMoveMeta(move);
  const nextLineSet=new Set(lineSet);
  nextLineSet.add(moveMeta.key);

  let gained=0;
  for(const boxRef of moveMeta.boxes){
    if(countBoxSides(boxRef,nextLineSet)===4){
      gained++;
    }
  }

  const nextScores=scoreState.slice();
  nextScores[playerIndex]+=gained;

  return {
    lineSet:nextLineSet,
    scores:nextScores,
    playerIndex:gained>0 ? playerIndex : (playerIndex+1)%players.length,
    gained
  };
}

function evaluateBoardState(lineSet,scoreState,playerIndex){
  const aiIndex=getAIPlayerIndex();
  if(aiIndex===-1){
    return 0;
  }

  const aiScore=scoreState[aiIndex];
  const strongestOpponent=getStrongestOpponentScore(scoreState,aiIndex);
  let score=(aiScore-strongestOpponent)*1000;
  let threeSideBoxes=0;
  let twoSideBoxes=0;

  for(const boxRef of boxLibrary){
    const sides=countBoxSides(boxRef,lineSet);
    if(sides===3){
      threeSideBoxes++;
    }else if(sides===2){
      twoSideBoxes++;
    }
  }

  score+=playerIndex===aiIndex ? threeSideBoxes*60 : -threeSideBoxes*60;
  score-=twoSideBoxes*6;

  return score;
}

function getSearchCandidates(lineSet,playerIndex){
  const availableMoves=getAvailableMovesFromLineSet(lineSet);
  const scoredMoves=[];
  const safeMoves=[];
  const riskyMoves=[];

  for(const move of availableMoves){
    const stats=inspectMoveMeta(move,lineSet);

    if(stats.completedBoxes>0){
      scoredMoves.push(move);
    }else if(stats.createdThirdEdges===0){
      safeMoves.push(move);
    }else{
      riskyMoves.push(move);
    }
  }

  const movesLeft=moveLibrary.length-lineSet.size;
  const source=scoredMoves.length ? scoredMoves : safeMoves.length ? safeMoves : riskyMoves;
  const ordered=orderMovesForSearch(source,lineSet,playerIndex,movesLeft);
  const width=getCandidateWidth(movesLeft,scoredMoves.length>0,safeMoves.length>0);

  return ordered.slice(0,width);
}

function searchBestOutcome(lineSet,scoreState,playerIndex,depth,alpha,beta){
  const movesLeft=moveLibrary.length-lineSet.size;

  if(hasSearchTimeExpired()){
    return {score:evaluateBoardState(lineSet,scoreState,playerIndex),move:null,timedOut:true};
  }

  if(depth<=0 || movesLeft===0){
    return {score:evaluateBoardState(lineSet,scoreState,playerIndex),move:null,timedOut:false};
  }

  const candidates=getSearchCandidates(lineSet,playerIndex);
  if(!candidates.length){
    return {score:evaluateBoardState(lineSet,scoreState,playerIndex),move:null,timedOut:false};
  }

  const aiIndex=getAIPlayerIndex();
  const maximizing=playerIndex===aiIndex;
  let bestScore=maximizing ? -Infinity : Infinity;
  let bestMove=candidates[0];

  for(const move of candidates){
    const nextState=applySimulatedMove(lineSet,scoreState,playerIndex,move);
    const result=searchBestOutcome(
      nextState.lineSet,
      nextState.scores,
      nextState.playerIndex,
      depth-1,
      alpha,
      beta
    );

    if(result.timedOut){
      return {
        score:bestMove ? bestScore : evaluateBoardState(lineSet,scoreState,playerIndex),
        move:bestMove,
        timedOut:true
      };
    }

    if(maximizing){
      if(result.score>bestScore){
        bestScore=result.score;
        bestMove=move;
      }
      alpha=Math.max(alpha,bestScore);
    }else{
      if(result.score<bestScore){
        bestScore=result.score;
        bestMove=move;
      }
      beta=Math.min(beta,bestScore);
    }

    if(beta<=alpha){
      break;
    }
  }

  return {score:bestScore,move:bestMove,timedOut:false};
}

function chooseBestTimedAIMove(lineSet,movesLeft){
  const availableMoves=getAvailableMovesFromLineSet(lineSet);
  if(!availableMoves.length){
    return null;
  }

  let bestMove=orderMovesForSearch(availableMoves,lineSet,currentPlayer,movesLeft)[0] || availableMoves[0];
  aiSearchDeadline=performance.now()+getLongThinkTimeMs();

  const maxDepth=Math.max(getSearchDepth(movesLeft),getLongSearchDepth(movesLeft));

  for(let depth=2;depth<=maxDepth;depth++){
    const result=searchBestOutcome(lineSet,scores.slice(),currentPlayer,depth,-Infinity,Infinity);

    if(result.timedOut){
      break;
    }

    if(result.move){
      bestMove=result.move;
    }

    if(hasSearchTimeExpired()){
      break;
    }
  }

  aiSearchDeadline=0;
  return bestMove;
}

function chooseBestAIMove(){
  const lineSet=getLineSet();
  const movesLeft=moveLibrary.length-lines.length;

  if(AI && shouldUseExactSolver(movesLeft)){
    const exactMove=searchTwoPlayerExactOutcome(
      getLineMask(),
      currentPlayer,
      movesLeft,
      -Infinity,
      Infinity
    ).move;

    if(exactMove){
      return exactMove;
    }
  }

  if(players.length===2 && size>=5){
    const timedMove=chooseBestTimedAIMove(lineSet,movesLeft);
    if(timedMove){
      return timedMove;
    }
  }

  aiSearchDeadline=0;
  const depth=getSearchDepth(moveLibrary.length-lineSet.size);
  const bestMove=searchBestOutcome(lineSet,scores.slice(),currentPlayer,depth,-Infinity,Infinity).move;

  return bestMove || getAvailableMoves()[0] || null;
}

// Stronger AI:
// 1. looks ahead several turns
// 2. protects safe edges early
// 3. reads endgame chains instead of walking into obvious traps

function aiMove(){
  if(gameFinished) return;
  if(!AI || players[currentPlayer]!=="AI") return;

  const thinkerId=++aiThinkingToken;
  const movesLeft=moveLibrary.length-lines.length;

  turnText.innerText=shouldUseExactSolver(movesLeft)
    ? `Thankan: ആലോചിക്കട്ടെ....`
    : `Thankan: ചിന്തിക്കട്ടെ മൈരേ....Wait ചെയ്യ്....`;

  setTimeout(()=>{
    if(gameFinished) return;
    if(!AI || players[currentPlayer]!=="AI") return;
    if(thinkerId!==aiThinkingToken) return;

    const move=chooseBestAIMove();
    if(!move) return;

    drawLine(move.a,move.b);

    let scored=checkBox();

    if(!scored) currentPlayer=(currentPlayer+1)%players.length;

    updateScore();
    if(!gameFinished){
      setTimeout(aiMove,300);
    }
  },30);
}

// Show the winner popup, ranking, confetti, and victory sound.
function stopGame(){
  if(gameFinished===false && lines.length===0) return;
  gameFinished=true;

  const oldPopup=document.getElementById("winnerPopup");
  if(oldPopup) oldPopup.remove();

  let ranking = players
    .map((p,i)=>({name:p, score:scores[i]}))
    .sort((a,b)=>b.score-a.score);
  const aiWon=isBotPlayerName(ranking[0]?.name) && (!ranking[1] || ranking[0].score>ranking[1].score);

  let popup = document.createElement("div");
  popup.id="winnerPopup";
  popup.style.position="fixed";
  popup.style.inset="0";
  popup.style.background="rgba(0,0,0,0.85)";
  popup.style.display="flex";
  popup.style.justifyContent="center";
  popup.style.alignItems="center";
  popup.style.zIndex="10002";
  popup.style.pointerEvents="auto";

  popup.innerHTML = `
    <div style="
      background:linear-gradient(145deg,#111,#1a1a2e);
      padding:40px;
      border-radius:20px;
      width:420px;
      max-width:90%;
      text-align:center;
      box-shadow:0 0 40px #00d4ff;
      animation:popupScale 0.3s ease;
      color:white;
    ">
      <h1 style="margin-bottom:15px;">🏆 WINNER</h1>

      <div style="font-size:22px;color:gold;margin:10px 0;">
        🥇 ${getDisplayName(ranking[0].name)} (${ranking[0].score})
      </div>

      ${ranking[1] ? `<div style="font-size:18px;color:silver;">🥈 ${getDisplayName(ranking[1].name)} (${ranking[1].score})</div>` : ""}
      ${ranking[2] ? `<div style="font-size:16px;color:#cd7f32;">🥉 ${getDisplayName(ranking[2].name)} (${ranking[2].score})</div>` : ""}

      <button id="playAgainBtn" type="button" style="
        margin-top:20px;
        padding:12px 20px;
        font-size:16px;
        border-radius:10px;
        background:#00d4ff;
        border:none;
      ">
        ${isOnlineMode() ? "Back to Room" : "Play Again"}
      </button>
    </div>
  `;

  document.body.appendChild(popup);

  const playAgainBtn=document.getElementById("playAgainBtn");
  const nextAction=isOnlineMode() ? returnToOnlineRoomLobby : goToLobby;
  if(playAgainBtn){
    playAgainBtn.addEventListener("click",nextAction);
    playAgainBtn.addEventListener("touchend",(event)=>{
      event.preventDefault();
      nextAction();
    },{passive:false});
  }

  for(let i=0;i<120;i++){
    let c=document.createElement("div");
    c.className="confetti";

    c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration=(Math.random()*2+2)+"s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),4000);
  }

  playVictorySound(aiWon);
}

function returnToOnlineRoomLobby(){
  document.querySelectorAll(".confetti").forEach(node=>node.remove());
  const winnerPopup=document.getElementById("winnerPopup");
  if(winnerPopup) winnerPopup.remove();

  board.innerHTML="";
  scoreboard.innerHTML="";
  turnText.innerText="";
  aiLevelStatus.textContent="";
  aiLevelStatus.classList.remove("show");
  game.style.display="none";
  setup.style.display="block";

  dots=[];
  lines=[];
  boxes=[];
  selected=[];
  players=[];
  scores=[];
  currentPlayer=0;
  lastDrawnLine=null;
  onlineGameState=null;
  resetRoundFeedbackState();

  if(onlineRoomState){
    syncModeUI();
  }
}

// Return to the setup screen without replaying the intro.
function goToLobby(){
  if(isOnlineMode()){
    returnToOnlineRoomLobby();
    return;
  }

  document.querySelectorAll(".confetti").forEach(node=>node.remove());
  const winnerPopup=document.getElementById("winnerPopup");
  if(winnerPopup) winnerPopup.remove();

  board.innerHTML="";
  scoreboard.innerHTML="";
  turnText.innerText="";
  aiLevelStatus.textContent="";
  aiLevelStatus.classList.remove("show");
  game.style.display="none";
  setup.style.display="block";

  dots=[];
  lines=[];
  boxes=[];
  selected=[];
  players=[];
  scores=[];
  currentPlayer=0;
  resetRoundFeedbackState();
  syncAINameInput();
}

// Restart now behaves like returning to the lobby.
function restart(){ goToLobby(); }

// Restore the intro overlay on first page load.
window.addEventListener("load",()=>{
  startIntroFX();

  setTimeout(()=>{
    const intro=document.getElementById("intro");
    if(intro) intro.remove();
  },4200);
});

function startIntroFX(){
  const introCanvas=document.getElementById("introCanvas");
  if(!introCanvas) return;

  const introCtx=introCanvas.getContext("2d");
  introCanvas.width=window.innerWidth;
  introCanvas.height=window.innerHeight;

  const stars=Array.from({length:120},()=>({
    x:Math.random()*introCanvas.width,
    y:Math.random()*introCanvas.height,
    r:Math.random()*2,
    v:Math.random()*0.6+0.2
  }));

  function draw(){
    if(!document.body.contains(introCanvas)) return;

    introCtx.fillStyle="black";
    introCtx.fillRect(0,0,introCanvas.width,introCanvas.height);

    introCtx.fillStyle="#00d4ff";

    stars.forEach(s=>{
      s.y+=s.v;
      if(s.y>introCanvas.height) s.y=0;

      introCtx.beginPath();
      introCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
      introCtx.fill();
    });

    requestAnimationFrame(draw);
  }

  draw();
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function resolveVoiceClipPath(clipPath){
  if(!clipPath) return "";

  const normalized=String(clipPath).trim();
  if(!normalized) return "";

  // Allow plain file names like "ai-1.mp3" by resolving them inside the sounds folder.
  const looksAbsolute=/^(https?:)?\/\//i.test(normalized) || normalized.startsWith("/") || normalized.startsWith("./") || normalized.startsWith("../");
  const repoPath=looksAbsolute || normalized.includes("/") ? normalized : `${VOICE_ASSET_FOLDER}${normalized}`;

  try{
    return new URL(repoPath,window.location.href).href;
  }catch{
    return repoPath;
  }
}

function getVoiceConfig(playerName){
  const clips=playerVoiceClips[playerName] || playerVoiceClips.default || [];
  return clips.map(resolveVoiceClipPath);
}

function shuffleArray(items){
  const copy=items.slice();

  for(let i=copy.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]]=[copy[j],copy[i]];
  }

  return copy;
}

function getNextVoiceClip(playerName){
  const clips=getVoiceConfig(playerName).filter(Boolean);
  if(!clips.length) return "";

  if(!voiceShuffleBags[playerName] || !voiceShuffleBags[playerName].length){
    const nextBag=shuffleArray(clips);

    if(nextBag.length>1 && lastVoiceClipByPlayer[playerName]===nextBag[0]){
      const swapIndex=nextBag.length-1;
      [nextBag[0],nextBag[swapIndex]]=[nextBag[swapIndex],nextBag[0]];
    }

    voiceShuffleBags[playerName]=nextBag;
  }

  const clipUrl=voiceShuffleBags[playerName].shift() || "";
  lastVoiceClipByPlayer[playerName]=clipUrl;
  return clipUrl;
}

function getVoiceEmoji(playerName,scoreCount){
  const emojiList=playerVoiceEmoji[playerName] || playerVoiceEmoji.default || ["🎉"];
  return emojiList[(scoreCount-1) % emojiList.length];
}

function queueVoiceForScore(playerName,scoreCount){
  if(!soundEnabled) return;
  if(!hasCommentatorBot()) return;

  // Thankan only comments on real human scores.
  if(isBotPlayerName(playerName)) return;

  // Control whether the custom clip should play for this score count.
  // With interval 2: scores 1,3,5... play. Scores 2,4,6... stay silent.
  if(((scoreCount-1) % VOICE_TRIGGER_INTERVAL)!==0) return;

  const clipUrl=getNextVoiceClip(AI_PLAYER_ID);
  if(!clipUrl) return;

  voiceQueue.push({
    playerName:getCommentatorPlayerName(),
    scoreCount,
    clipUrl,
    emoji:getVoiceEmoji(AI_PLAYER_ID,scoreCount)
  });

  if(!voicePlaying){
    playNextVoiceInQueue();
  }
}

function playNextVoiceInQueue(){
  if(voicePlaying || !voiceQueue.length || !soundEnabled) return;

  const item=voiceQueue.shift();
  if(!item) return;

  // Only one custom voice clip plays at a time to avoid overlap.
  voicePlaying=true;
  currentVoiceSpeaker=item.playerName;
  currentVoiceEmoji=item.emoji;
  showSpeakerBadge(item.playerName,item.emoji);

  const audio=new Audio(item.clipUrl);
  audio.preload="auto";
  audio.volume=0.95;

  const finish=()=>{
    audio.onended=null;
    audio.onerror=null;
    voicePlaying=false;
    currentVoiceSpeaker=null;
    currentVoiceEmoji="";
    setTimeout(playNextVoiceInQueue,80);
  };

  audio.onended=finish;
    audio.onerror=finish;
  audio.play().catch(finish);
}

function showSpeakerBadge(playerName,emoji){
  const playerIndex=players.findIndex(name=>name===playerName);
  if(playerIndex===-1) return;

  // Show a fixed emoji slot near the AI without moving the layout.
  const badge=document.getElementById(`speaker-${playerIndex}`);
  if(!badge) return;

  badge.textContent=emoji;
  badge.classList.add("show");

  if(scoreAnnouncementTimers[playerIndex]){
    clearTimeout(scoreAnnouncementTimers[playerIndex]);
  }

  scoreAnnouncementTimers[playerIndex]=setTimeout(()=>{
    badge.classList.remove("show");
    badge.textContent="";
  },1800);
}

const canvas = document.getElementById("bgParticles");
const ctx = canvas.getContext("2d");

let particles = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// create particles
for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*2,
    dx: (Math.random()-0.5)*0.4,
    dy: (Math.random()-0.5)*0.4
  });
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    p.x += p.dx;
    p.y += p.dy;

    if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = "rgba(0,212,255,0.6)";
    ctx.fill();
  }

  requestAnimationFrame(animateParticles);
}

animateParticles();
